<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>미니 로그</title>
		<meta
			name="description"
			content="짧은 기록과 상호작용을 가볍게 나눌 수 있는 SNS형 라이프로그 서비스 Mini Log" />

		<meta property="og:title" content="미니 로그" />
		<meta
			property="og:description"
			content="짧은 기록과 상호작용을 가볍게 나눌 수 있는 SNS형 라이프로그 서비스 Mini Log" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://mini-log-v1.vercel.app/" />
		<meta
			property="og:image"
			content="https://mini-log-v1.vercel.app/thumbnail.png?v=20260319" />
		<meta property="og:image:alt" content="Mini Log 서비스 미리보기 이미지" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="미니 로그" />
		<meta
			name="twitter:description"
			content="짧은 기록과 상호작용을 가볍게 나눌 수 있는 SNS형 라이프로그 서비스 Mini Log" />
		<meta
			name="twitter:image"
			content="https://mini-log-v1.vercel.app/thumbnail.png?v=20260319" />
		<script>
			try {
				const themeStore = localStorage.getItem('ThemeStore')
					? JSON.parse(localStorage.getItem('ThemeStore'))
					: null;

				const theme = themeStore.state.theme;

				const htmlTag = document.documentElement;
				htmlTag.classList.remove('dark', 'light');

				if (theme === 'system') {
					const isDarkTheme = window.matchMedia(
						'(prefers-color-scheme: dark)'
					).matches;

					htmlTag.classList.add(isDarkTheme ? 'dark' : 'light');
				} else {
					htmlTag.classList.add(theme);
				}
			} catch (error) {
				console.error(error);
			}
		</script>
	</head>
	<body>
		<div id="root"></div>
		<div id="modal-root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
